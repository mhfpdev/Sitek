<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Xadrez Hardcore vs IA</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>

<style>
body {
    background: #0d1117;
    color: #fff;
    font-family: Arial;
    text-align: center;
}
#board { width: 420px; margin: 20px auto; }
button { padding: 10px; margin: 5px; }
</style>
</head>
<body>

<h1>♟️ Xadrez vs IA</h1>
<button onclick="startGame()">▶️ Play</button>
<div id="timer">10:00 | 10:00</div>
<div id="board"></div>
<button onclick="restartGame()">🔄 Reiniciar</button>

<script>

var board
var game

var whiteTime = 600
var blackTime = 600

function startGame() {
    game = new Chess()

    var config = {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDragStart: onDragStart,
        onDrop: onDrop
    }

    board = Chessboard('board', config)
    startTimer()
}

function restartGame() {
    game = new Chess()
    board.position('start')
    whiteTime = 600
    blackTime = 600
}

function onDragStart(source, piece) {
    if (game.game_over()) return false
    if (piece.search(/^b/) !== -1) return false
}

function onDrop(source, target) {
    var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
    })

    if (move === null) {
        return 'snapback'
    }

    setTimeout(makeBestMove, 200)
}

function makeBestMove() {
    var move = minimaxRoot(3, game, true)
    game.move(move)
    board.position(game.fen())

    if (game.in_checkmate()) {
        alert("💀 CHECKMATE")
        restartGame()
    }
}

function minimaxRoot(depth, game, isMaximisingPlayer) {
    var moves = game.moves()
    var bestMove = -9999
    var bestMoveFound

    for (var i = 0; i < moves.length; i++) {
        var move = moves[i]
        game.move(move)
        var value = minimax(depth - 1, game, -10000, 10000, false)
        game.undo()
        if (value >= bestMove) {
            bestMove = value
            bestMoveFound = move
        }
    }
    return bestMoveFound
}

function minimax(depth, game, alpha, beta, isMaximisingPlayer) {
    if (depth === 0) return -evaluateBoard(game.board())

    var moves = game.moves()

    if (isMaximisingPlayer) {
        var best = -9999
        for (var i = 0; i < moves.length; i++) {
            game.move(moves[i])
            best = Math.max(best, minimax(depth - 1, game, alpha, beta, false))
            game.undo()
            alpha = Math.max(alpha, best)
            if (beta <= alpha) return best
        }
        return best
    } else {
        var best = 9999
        for (var i = 0; i < moves.length; i++) {
            game.move(moves[i])
            best = Math.min(best, minimax(depth - 1, game, alpha, beta, true))
            game.undo()
            beta = Math.min(beta, best)
            if (beta <= alpha) return best
        }
        return best
    }
}

function evaluateBoard(board) {
    var total = 0
    var values = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 900 }

    for (var i = 0; i < 8; i++) {
        for (var j = 0; j < 8; j++) {
            var piece = board[i][j]
            if (piece !== null) {
                var value = values[piece.type]
                total += piece.color === 'w' ? value : -value
            }
        }
    }
    return total
}

function startTimer() {
    setInterval(function() {
        if (!game) return

        if (game.turn() === 'w') whiteTime--
        else blackTime--

        document.getElementById("timer").innerText =
            format(whiteTime) + " | " + format(blackTime)

        if (whiteTime <= 0 || blackTime <= 0) {
            alert("⏱️ Tempo acabou")
            restartGame()
        }

    }, 1000)
}

function format(t) {
    var m = Math.floor(t/60)
    var s = t%60
    return m + ':' + (s<10?'0'+s:s)
}

</script>
</body>
</html>
