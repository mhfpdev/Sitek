<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Xadrez Hardcore vs IA</title>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>

<style>
body {
    background: #0d1117;
    color: #fff;
    font-family: Arial;
    text-align: center;
}

h1 { color: #58a6ff; }

#menu {
    margin-top: 30px;
}

button {
    padding: 10px 20px;
    background: #238636;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

button:hover {
    background: #2ea043;
}

#game {
    display: none;
}

#board {
    width: 420px;
    margin: 20px auto;
}

#timer {
    font-size: 20px;
    margin: 10px;
}

select {
    padding: 5px;
    border-radius: 5px;
}
</style>
</head>

<body>

<h1>♟️ Xadrez vs IA Hardcore</h1>

<div id="menu">
    <button onclick="startGame()">▶️ PLAY</button>

    <br><br>

    Tema:
    <select onchange="changeTheme(this.value)">
        <option value="default">Clássico</option>
        <option value="blue">Azul</option>
        <option value="dark">Escuro</option>
    </select>
</div>

<div id="game">
    <div id="timer">10:00 | 10:00</div>
    <div id="board"></div>
    <button onclick="restartGame()">🔄 Reiniciar</button>
</div>

<script>

var board
var game = new Chess()

var whiteTime = 600
var blackTime = 600
var timerInterval

function startGame() {
    document.getElementById("menu").style.display = "none"
    document.getElementById("game").style.display = "block"
    initBoard()
    startTimer()
}

function restartGame() {
    game = new Chess()
    board.position('start')
    whiteTime = 600
    blackTime = 600
}

function initBoard() {
    var config = {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDragStart: onDragStart,
        onDrop: onDrop
    }
    board = Chessboard('board', config)
}

function onDragStart(source, piece) {
    if (game.game_over()) return false
    if (piece.search(/^b/) !== -1) return false
}

function onDrop(source, target) {
    var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
    })

    if (move === null) return 'snapback'

    checkGameState()

    setTimeout(makeBestMove, 200)
}

function makeBestMove() {
    var move = minimaxRoot(3, game, true)
    game.move(move)
    board.position(game.fen())

    checkGameState()
}

function checkGameState() {
    if (game.in_checkmate()) {
        setTimeout(() => {
            alert("💀 CHECKMATE!")
            restartGame()
        }, 200)
    }

    if (game.in_draw()) {
        setTimeout(() => {
            alert("🤝 EMPATE!")
            restartGame()
        }, 200)
    }
}

/* IA */

function minimaxRoot(depth, game, isMaximisingPlayer) {
    var moves = game.moves()
    var bestMove = -9999
    var bestMoveFound

    for (var i = 0; i < moves.length; i++) {
        var move = moves[i]
        game.move(move)
        var value = minimax(depth - 1, game, -10000, 10000, !isMaximisingPlayer)
        game.undo()
        if (value >= bestMove) {
            bestMove = value
            bestMoveFound = move
        }
    }
    return bestMoveFound
}

function minimax(depth, game, alpha, beta, isMaximisingPlayer) {
    if (depth === 0) return -evaluateBoard(game.board())

    var moves = game.moves()

    if (isMaximisingPlayer) {
        var best = -9999
        for (var i = 0; i < moves.length; i++) {
            game.move(moves[i])
            best = Math.max(best, minimax(depth - 1, game, alpha, beta, false))
            game.undo()
            alpha = Math.max(alpha, best)
            if (beta <= alpha) return best
        }
        return best
    } else {
        var best = 9999
        for (var i = 0; i < moves.length; i++) {
            game.move(moves[i])
            best = Math.min(best, minimax(depth - 1, game, alpha, beta, true))
            game.undo()
            beta = Math.min(beta, best)
            if (beta <= alpha) return best
        }
        return best
    }
}

function evaluateBoard(board) {
    var total = 0
    var values = { p: 10, r: 50, n: 30, b: 30, q: 90, k: 900 }

    for (var i = 0; i < 8; i++) {
        for (var j = 0; j < 8; j++) {
            var piece = board[i][j]
            if (piece !== null) {
                var value = values[piece.type]
                total += piece.color === 'w' ? value : -value
            }
        }
    }
    return total
}

/* TIMER */

function startTimer() {
    clearInterval(timerInterval)

    timerInterval = setInterval(() => {
        if (game.turn() === 'w') whiteTime--
        else blackTime--

        if (whiteTime <= 0 || blackTime <= 0) {
            alert("⏱️ Tempo acabou!")
            restartGame()
        }

        document.getElementById("timer").innerText =
            format(whiteTime) + " | " + format(blackTime)
    }, 1000)
}

function format(t) {
    let m = Math.floor(t / 60)
    let s = t % 60
    return m + ":" + (s < 10 ? "0" + s : s)
}

/* TEMAS */

function changeTheme(theme) {
    let boardEl = document.getElementById("board")

    if (theme === "blue") {
        boardEl.style.filter = "hue-rotate(180deg)"
    } else if (theme === "dark") {
        boardEl.style.filter = "brightness(0.7)"
    } else {
        boardEl.style.filter = "none"
    }
}

</script>
</body>
</html>
